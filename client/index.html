<!DOCTYPE html>
<html>
<head>
  <title>Love Battle Arena</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="menu">

  <h1>💖 Love Battle Arena 💖</h1>

  <input
    id="playerName"
    type="text"
    placeholder="Enter Your Name"
  >

  <br><br>

  <button onclick="createRoom()">
    Create Room
  </button>

  <br><br>

  <input
    id="roomCode"
    type="text"
    placeholder="Room Code"
  >

  <br><br>

  <button onclick="joinRoom()">
    Join Room
  </button>

</div>

<div id="game">

  <div id="topBar">

    <div>
      ❤️ HP:
      <span id="hp">100</span>
    </div>

    <div>
      🔫 Kills:
      <span id="kills">0</span>
    </div>

  </div>
<div id="hud">
  <span>
    ⏱️ <span id="timer">300</span>
  </span>

  <span style="margin-left:20px;">
    🏆 Ananda:
    <span id="kills">0</span>
  </span>

  <span style="margin-left:20px;">
    ❤️ Enemy:
    <span id="hp">100</span>
  </span>
</div>

<button
  id="restartBtn"
  style="display:none;"
>
  Restart Match
</button>

  <canvas id="canvas"></canvas>
<div id="mobileControls">

  <button id="leftBtn">⬅️</button>

  <button id="jumpBtn">⬆️</button>

  <button id="rightBtn">➡️</button>

  <button id="shootBtn">🔫</button>

</div>

</div>


<script src="player.js"></script>
<script src="controls.js"></script>
<script src="/socket.io/socket.io.js"></script>
<script src="game.js"></script>

</body>
</html>
